---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu-latest
    image: ubuntu:22.04
    pre_build_image: false
    dockerfile: ../Dockerfile.j2
    command: /bin/bash
    tty: true

  - name: oraclelinux-8
    image: oraclelinux:8
    pre_build_image: false
    dockerfile: ../Dockerfile.j2
    command: /bin/bash
    tty: true

provisioner:
  name: ansible
  connection_options:
    ansible_connection: docker
    ansible_python_interpreter: /usr/bin/python3
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
