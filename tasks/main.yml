---
# tasks file for vector-role
- name: Create vector installation directory
  ansible.builtin.file:
    path: "{{ vector_install_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: [vector, distr]

- name: Create vector config directory
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: [vector, config]

- name: Create vector data directory
  ansible.builtin.file:
    path: "{{ vector_data_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: [vector, config]

- name: Download vector on localhost
  ansible.builtin.get_url:
    url: "{{ vector_download_url }}"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: '0644'
  delegate_to: localhost
  run_once: true
  tags: [vector, distr]

- name: Copy vector archive to remote host
  ansible.builtin.copy:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: '0644'
  tags: [vector, distr]

- name: Unpack vector
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "{{ vector_install_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=2"
    creates: "{{ vector_install_dir }}/bin/vector"
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [vector, distr]

- name: Create symlink for vector binary
  ansible.builtin.file:
    src: "{{ vector_binary_path }}"
    dest: /usr/local/bin/vector
    state: link
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [vector, distr]

- name: Deploy vector systemd service
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    mode: '0644'
  notify: Restart vector service
  tags: [vector, service]

- name: Deploy vector configuration
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_path }}"
    mode: '0644'
    owner: root
    group: root
  notify: Restart vector service
  tags: [vector, config]

- name: Enable and start vector service
  ansible.builtin.systemd:
    name: vector
    state: started
    enabled: true
    daemon_reload: true
  when:
    - ansible_service_mgr == 'systemd'
    - ansible_facts['service_mgr'] is defined
    - not (ansible_virtualization_type | default('') in ['docker', 'container', 'lxc'])
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [vector, service]

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags: [vector, restart_service]
